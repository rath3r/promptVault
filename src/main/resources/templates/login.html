<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<form th:action="@{/login}" method="post">

    <input type="text"
           name="username"
           placeholder="Username">

    <input type="password"
           name="password"
           placeholder="Password">

    <button type="submit">
        Login
    </button>

</form>
<p>
    Don't have an account?
    <a th:href="@{/register}">Register here</a>
</p>
</body>
</html>
