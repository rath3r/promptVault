<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: common-head('Dashboard')"></head>
<body class="bg-light">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3">Prompt Dashboard</h1>
        <p>View your <a th:href="@{'/history'}">prompt subission history here</a>.</p>
        <a class="btn btn-primary" href="/prompts/new">
            + New Prompt
        </a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body p-0">

            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Content</th>
                        <th>Category</th>
                        <th>Shared</th>
                        <th style="width: 270px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="prompt : ${prompts}">
                        <td th:text="${prompt.id}"></td>
                        <td th:text="${prompt.title}"></td>
                        <td th:text="${prompt.promptText}"></td>
                        <td th:text="${prompt.category != null ? prompt.category.name : 'Uncategorized'}"></td>
                        <td th:text="${prompt.shared}"></td>
                        <td>
                                <div class="d-flex gap-2">

                            <a class="btn btn-sm btn-warning" th:href="@{'/prompts/edit/' + ${prompt.id}}">Edit</a>
                            <a class="btn btn-sm btn-danger" th:href="@{'/prompts/delete/' + ${prompt.id}}" onclick="return confirm('Delete this prompt?')">Delete</a>
                            <form th:action="@{/prompts/{id}/submit(id=${prompt.id})}"
                                method="post" class="m-0">
                                <button type="submit" class="btn btn-success btn-sm">
                                    Submit to AI
                                </button>
                            </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
