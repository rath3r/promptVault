<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: common-head('Shared prompts')"></head>
<body class="bg-light">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="container mt-4">

    <h1>Shared Prompts</h1>

    <table class="table table-striped table-hover mb-0">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Title</th>
                <th>Content</th>
                <th>Category</th>
                <th>Shared</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="prompt : ${prompts}">
                <td th:text="${prompt.id}"></td>
                <td th:text="${prompt.owner.username}"></td>
                <td th:text="${prompt.title}"></td>
                <td th:text="${prompt.promptText}"></td>
                <td th:text="${prompt.category != null ? prompt.category.name : 'Uncategorized'}"></td>
                <td th:text="${prompt.shared}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
