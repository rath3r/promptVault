<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Prompts')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <h1 class="mb-4">All Prompts</h1>

    <table class="table table-striped">

        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Owner</th>
            <th>Category</th>
            <th>Flagged</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="prompt : ${prompts}">

            <td th:text="${prompt.id}"></td>

            <td th:text="${prompt.title}"></td>

            <td th:text="${prompt.owner.username}"></td>

            <td>
                <form th:action="@{/admin/prompts/{id}/category(id=${prompt.id})}"
                    method="post">

                    <select name="categoryId"
                            class="form-select">

                        <option
                            th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}">
                        </option>

                    </select>

                    <button class="btn btn-primary mt-2">
                        Assign Category
                    </button>

                </form>
            </td>

            <td>
                <span th:if="${prompt.flagged}"
                      class="badge bg-danger">
                    Flagged
                </span>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
