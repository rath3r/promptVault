<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/layout :: common-head('Edit Category')"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <h1 class="mb-4">Edit Category</h1>

    <form th:action="@{/admin/categories/{id}/edit(id=${category.id})}"
      th:object="${category}"
      method="post">

    <input type="text"
           th:field="*{name}"
           required />

    <button type="submit">Save</button>

</form>

<a th:href="@{/admin/categories}">Back</a>

</div>

</body>
</html>
