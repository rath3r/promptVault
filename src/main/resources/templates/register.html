<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: common-head('Register')"></head>
<body class="bg-light">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 col-lg-4">

            <div class="card shadow">
                <div class="card-body p-4">

                    <h2 class="card-title text-center mb-4">
                        Register
                    </h2>

                    <form th:action="@{/register}"
                          method="post"
                          th:object="${user}">

                        <div class="mb-3">
                            <label for="username" class="form-label">
                                Username
                            </label>
                            <input type="text"
                                   id="username"
                                   th:field="*{username}"
                                   class="form-control"
                                   placeholder="Enter username"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">
                                Email
                            </label>
                            <input type="email"
                                   id="email"
                                   th:field="*{email}"
                                   class="form-control"
                                   placeholder="Enter email"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">
                                Password
                            </label>
                            <input type="password"
                                   id="password"
                                   th:field="*{password}"
                                   class="form-control"
                                   placeholder="Enter password"
                                   required>
                        </div>

                        <div class="d-grid">
                            <button type="submit"
                                    class="btn btn-primary">
                                Register
                            </button>
                        </div>

                    </form>

                    <hr>

                    <p class="text-center mb-0">
                        Already have an account?
                        <a th:href="@{/login}">
                            Login here
                        </a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
