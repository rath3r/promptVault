<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: common-head('Prompt submission History')"></head>
<body class="bg-light">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="container mt-4">

    <h1>Prompt submission History/h1>

    <table class="table">

    <thead>
    <tr>
        <th>Prompt</th>
        <th>Date</th>
        <th>Response</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="submission : ${submissions}">

        <td th:text="${submission.prompt.title}"></td>

        <td th:text="${submission.submittedAt}"></td>

        <td th:text="${submission.responseText}"></td>

    </tr>

    </tbody>

</table>
</div>
</body>
</html>
